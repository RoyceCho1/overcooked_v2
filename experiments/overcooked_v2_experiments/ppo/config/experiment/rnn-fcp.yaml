# @package _global_
defaults:
  - override /model: rnn

NUM_SEEDS: 1

model:
  LR: 0.0007
  ENT_COEF: 0.04
  GAE_LAMBDA: 0.9
  TOTAL_TIMESTEPS: 3e6 # User specified 3,000,000
  NUM_ENVS: 256
  NUM_STEPS: 256
  NUM_MINIBATCHES: 64
  UPDATE_EPOCHS: 4
  MAX_GRAD_NORM: 0.25
  VF_COEF: 0.5
  CLIP_EPS: 0.2
  ANNEAL_LR: True

# Default FCP settings
context_mode: "encoder"
use_recipe_encoder: true
